<section class="contact-section">
  <div class="container">
    <div class="contact-wrapper">
      
      <div class="contact-form-side">
        <h3>Contact Form</h3>
        
        <form id="contactform">
          <input type="text" id="name" placeholder="Your Name" required>
          <input type="email" id="email" placeholder="Your Email" required>
          <input type="text" id="subject" placeholder="Subject">
          <textarea id="message" placeholder="Your Message" required></textarea>
          <button type="submit" class="submit-btn">Submit Now</button>
        </form>
        <p id="msg"></p>
      </div>

      <div class="contact-info-side">
        <div class="info-card">
          <img src="../images/dgc1.jpeg" alt="Campus" class="side-img">
          <div class="info-details">
             <p><b>Address:</b> DGC, Rahon</p>
             <p><b>Email:</b> info@college.com</p>
             <p><b>Phone:</b> +91 9111120033</p>
          </div>
        </div>

     <div class="map-container">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3419.822941323326!2d76.12863607538262!3d31.063595769741044!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3910bd29c322de33%3A0xbf1115e0d102af9a!2sDoaba%20Group%20Of%20Colleges%2C%20Rahon!5e0!3m2!1sen!2sin!4v1710000000000!5m2!1sen!2sin"

            height="250" 
            style="border:0;" 
            allowfullscreen=""

            referrerpolicy="no-referrer-when-downgrade">

    </div>

      </div>

    </div>
