<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMS Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

<div class="sidebar">
    <h2>🎓 SAMS</h2>
    <ul>
        <li onclick="loadData()">Dashboard</li>
        <li onclick="filterStatus('Approved')">Approved</li>
        <li onclick="filterStatus('Rejected')">Rejected</li>
        <li onclick="filterStatus('Pending')">Pending</li>
        <li onclick="logout()">Logout</li>
    </ul>
</div>

<div class="main">

<div class="topbar">
    <h2>Admin Dashboard</h2>
    <input type="text" placeholder="Search student..." class="search" onkeyup="searchStudent(this.value)">
</div>

<div class="cards">
    <div class="card blue">
        <h3>Total</h3>
        <h2 id="total">0</h2>
    </div>
    <div class="card green">
        <h3>Approved</h3>
        <h2 id="approved">0</h2>
    </div>
    <div class="card red">
        <h3>Rejected</h3>
        <h2 id="rejected">0</h2>
    </div>
    <div class="card orange">
        <h3>Pending</h3>
        <h2 id="pending">0</h2>
    </div>
</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>
</div>

</div>

<script src="../js/main.js"></script>
<script src="../js/admin-dashboard.js"></script>

</body>
</html>
